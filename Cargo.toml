[package]
name = "envexa"
version = "1.4.2"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
regex = "1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
ratatui = "0.30"
crossterm = "0.28"
tui-piechart = "0.3.3"
throbber-widgets-tui = "0.11.0"
