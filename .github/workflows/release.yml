name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: envexa-aarch64-macos
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: envexa-x86_64-macos
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: envexa-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: envexa-aarch64-linux
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            asset: envexa-x86_64-windows.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-linker (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross-linker (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-x86-64-linux-gnu

      - name: Install cross-linker (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "target/${{ matrix.target }}/release/envexa${{ matrix.target == 'x86_64-pc-windows-gnu' && '.exe' || '' }}#${{ matrix.asset }}" \
            --clobber
